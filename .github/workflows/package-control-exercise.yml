name: Package Control exercise

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build reviewed exercise archive
        run: >-
          git archive --format=zip
          --output developer-atlas-control-exercise-v0.1.0.zip
          HEAD
          TRY_ATLAS.md
          control
          examples/browser-list-starter
          README.md
          FAQ.md
          LICENSE
          PROVENANCE.md
      - name: Write checksum
        run: sha256sum developer-atlas-control-exercise-v0.1.0.zip > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: developer-atlas-control-exercise-v0.1.0
          path: |
            developer-atlas-control-exercise-v0.1.0.zip
            SHA256SUMS.txt
          if-no-files-found: error
