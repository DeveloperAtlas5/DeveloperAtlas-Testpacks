<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Atlas Browser List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-card">
    <h1>Atlas Practice List</h1>

    <p>
      This small app uses HTML, CSS, JavaScript, the DOM, and localStorage.
    </p>

    <section class="list-app">
      <h2>Practice items</h2>

      <form class="item-form">
        <label for="item-name">New item</label>

        <div class="form-row">
          <input id="item-name" class="item-input" type="text" placeholder="Example: Learn routes">
          <button type="submit">Add item</button>
        </div>
      </form>

      <ul class="item-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
